<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🎮 Browser Game Hub<img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fplay.pokemonshowdown.com%2Fsprites%2Fgen5ani%2Fzeraora.gif&f=1&nofb=1&ipt=8dac71314265fe7df91e5969b25afd61e511061384d4ad912c4b04ee14ce9831" style="width: 50px; height: 50px;"></img></h1>
            <p>Discover the best games you can play instantly in your browser.</p>
                <div class="filters">
                <div class="phone-frame">
                    <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fmedia1.tenor.com%2Fimages%2F8be4efc0a8e5bc4903aae00db82cb982%2Ftenor.gif%3Fitemid%3D5648648&f=1&nofb=1&ipt=cc22acb2377a64078d80f0e0937d63821eddaebbfa781810f7f58ea4cfe5205a" style="width: 42px; height: 72px;"></img>

                </div>
                <input type="text" id="searchInput" placeholder="Search for a game...">
                <select id="genreFilter">
                    <option value="all">All Genres</option>
                    <option value="FPS">FPS</option>
                    <option value="Idle">Idle</option>
                    <option value="Puzzle">Puzzle</option>
                    <option value="Party">Party</option>
                    <option value="Arcade">Arcade</option>
                    <option value="Sandbox">Sandbox</option>
                    <option value="Driving">Driving</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <!-- JavaScript will populate this container -->
        <div id="gameContainer" class="game-container"></div>
    </main>

    <script src="script.js"></script>
    
</body>
</html>
